# Pre-commit configuration.
#
# One-time setup per dev machine:
#     pip install pre-commit        # or: brew install pre-commit
#     cargo install cargo-deny
#     pre-commit install --install-hooks
#     pre-commit install --hook-type commit-msg
#
# Note: Conventional Commits are enforced via `conventional-pre-commit` (which runs
# in pre-commit's own managed env) rather than bun/commitlint, to avoid pulling a
# JS toolchain into this lean Rust + shell project.
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-merge-conflict
      - id: check-yaml
      - id: check-toml

  - repo: https://github.com/compilerla/conventional-pre-commit
    rev: v4.4.0
    hooks:
      - id: conventional-pre-commit
        stages: [commit-msg]

  - repo: local
    # Route the Rust hooks through `rustup run stable` rather than a bare `cargo` so they
    # always use the rustup toolchain pinned in rust-toolchain.toml — even on a machine
    # that also has a standalone Homebrew `rust` earlier on PATH (which ignores
    # rust-toolchain.toml and ships its own rustfmt/clippy, causing formatting churn).
    # Keep `stable` in sync with rust-toolchain.toml's channel.
    hooks:
      - id: cargo-fmt
        name: cargo fmt
        entry: rustup run stable cargo fmt --all
        language: system
        pass_filenames: false
        types: [rust]

      - id: cargo-check
        name: cargo check
        entry: rustup run stable cargo check --all-targets
        language: system
        pass_filenames: false
        types: [rust]

      - id: cargo-clippy
        name: cargo clippy
        entry: rustup run stable cargo clippy --all-targets -- -D warnings
        language: system
        pass_filenames: false
        types: [rust]

      - id: cargo-deny
        name: cargo deny check
        # Requires `cargo install cargo-deny` (one-time). Config: deny.toml.
        entry: rustup run stable cargo deny check
        language: system
        pass_filenames: false
        types: [rust]
