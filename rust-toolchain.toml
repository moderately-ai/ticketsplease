[toolchain]
# ticketsplease builds on STABLE Rust on purpose: the tool must stay broadly
# installable via `cargo install --git` on any contributor's or user's default
# stable toolchain (deliberately not nightly). Bump to a pinned stable (e.g.
# "1.86.0") if CI reproducibility ever needs it.
channel = "stable"
components = ["rustfmt", "clippy"]
