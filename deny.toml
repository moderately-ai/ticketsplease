# cargo-deny configuration — supply-chain / advisory gate for ticketsplease.
#
# Run locally via:
#     cargo install cargo-deny   # one-time, per dev machine
#     cargo deny check
#
# The pre-commit hook runs the same command before every commit (see
# .pre-commit-config.yaml). Adapted from ../../tomsanbear/quiltdb without that
# repo's vendored git forks — ticketsplease pulls only crates.io dependencies.

[advisories]
db-urls = ["https://github.com/RustSec/advisory-db"]
# Every advisory severity (vulnerability, unsound, notice) denies by default in
# cargo-deny >= 0.18; extend the gate to crates yanked from crates.io.
yanked = "deny"
# Only flag unmaintained advisories for crates we directly own; transitive ones
# surface as informational notices without failing the build.
unmaintained = "workspace"

[licenses]
# Every license here is OSI-permissive, except MPL-2.0 which is file-level (weak)
# copyleft and standard to allow for an unmodified dependency. A new dependency
# whose license falls outside this set fails the gate, forcing deliberate review.
#
# Keep the list broad/forward-looking; silence "license-not-encountered" notices
# for permissive entries the current (small) dependency graph happens not to use.
unused-allowed-license = "allow"
allow = [
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "MIT",
    "MIT-0",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Zlib",
    "0BSD",
    "Unicode-3.0",
    "CC0-1.0",
    "Unlicense",
    "MPL-2.0",
]

[bans]
# Transitive duplicate minor versions are common and upstream's concern; WARN
# (visible, non-blocking) rather than fail the gate.
multiple-versions = "warn"
# The only wildcard deps are inter-member path deps, which are legitimate.
wildcards = "allow"

[sources]
# Only crates.io is allowed; any other registry or git source fails the gate.
unknown-registry = "deny"
unknown-git = "deny"
