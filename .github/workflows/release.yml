name: release

on:
  push:
    tags: ["v*"]
  # Manual fallback: `gh workflow run release.yml --ref vX.Y.Z` (the actions read
  # the tag from the dispatched ref), in case tag-push triggering is throttled.
  workflow_dispatch:

permissions:
  contents: write

# One release run per tag, ever. The push and workflow_dispatch triggers can both
# fire for the same tag; without this they race on create-release/upload and leave
# a broken, asset-less release. `cancel-in-progress: false` is deliberate — a
# duplicate QUEUES behind the in-flight run rather than cancelling it, because
# cancelling a release mid-upload is what corrupts it. The idempotent create-release
# below then makes the queued duplicate a clean no-op.
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # Create the GitHub Release first; the matrix below uploads assets to it.
  # (upload-rust-binary-action attaches to an existing release, it does not
  # create one — without this job every matrix job fails with "release not found".)
  create-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      # Idempotent: create the release only if absent. A re-run or a queued
      # duplicate trigger finds it already there and leaves it untouched, instead
      # of failing with "Release.tag_name already exists" (HTTP 422).
      - name: Create release if absent
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="${GITHUB_REF_NAME}"
          if gh release view "$tag" --repo "${GITHUB_REPOSITORY}" >/dev/null 2>&1; then
            echo "Release $tag already exists; leaving it in place."
          else
            gh release create "$tag" --repo "${GITHUB_REPOSITORY}" --title "$tag" --generate-notes
          fi

  upload:
    needs: create-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
          - target: aarch64-unknown-linux-musl
            os: ubuntu-latest
    runs-on: ${{ matrix.os }}
    env:
      # LTO at release time only: it inflates intermediate bitcode for no local
      # benefit, so it lives here rather than in Cargo.toml.
      CARGO_PROFILE_RELEASE_LTO: fat
    steps:
      - uses: actions/checkout@v5
      - name: Build and upload static binary
        uses: taiki-e/upload-rust-binary-action@v1
        with:
          bin: ticketsplease
          target: ${{ matrix.target }}
          # No version in the archive name so /releases/latest/download/<asset> resolves.
          archive: $bin-$target
          checksum: sha256
          token: ${{ secrets.GITHUB_TOKEN }}
