name: release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  # Create the GitHub Release first; the matrix below uploads assets to it.
  # (upload-rust-binary-action attaches to an existing release, it does not
  # create one — without this job every matrix job fails with "release not found".)
  create-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: taiki-e/create-gh-release-action@v1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

  upload:
    needs: create-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-apple-darwin
            os: macos-13
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
          - target: aarch64-unknown-linux-musl
            os: ubuntu-latest
    runs-on: ${{ matrix.os }}
    env:
      # LTO at release time only (per ~/.claude-work/rules/rust.md): inflates
      # intermediate bitcode for no local benefit, so it lives here, not in Cargo.toml.
      CARGO_PROFILE_RELEASE_LTO: fat
    steps:
      - uses: actions/checkout@v5
      - name: Build and upload static binary
        uses: taiki-e/upload-rust-binary-action@v1
        with:
          bin: ticketsplease
          target: ${{ matrix.target }}
          # No version in the archive name so /releases/latest/download/<asset> resolves.
          archive: $bin-$target
          checksum: sha256
          token: ${{ secrets.GITHUB_TOKEN }}
